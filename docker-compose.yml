version: '3'

services:
  mysql:
    image: mysql:8.0
    container_name: deploy_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - 13306:3306
    volumes:
      - ./mysql:/var/lib/mysql

  redis:
    image: redis:7
    container_name: deploy_redis
    ports:
      - 6379:6379
    volumes:
      - ./redis:/data

  zookeeper:
    image: zookeeper:3.8
    container_name: deploy_zookeeper
    ports:
      - 2181:2181
    volumes:
      - ./zookeeper:/data

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: deploy_kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    depends_on:
      - zookeeper

  grafana:
    image: grafana/grafana:latest
    container_name: deploy_grafana
    ports:
      - 3000:3000
    volumes:
      - ./grafana:/var/lib/grafana

  game_gateway:
    build: ../
    container_name: game_gateway
    volumes:
      - ../build:/app/build
    working_dir: /app
    command: /app/build/game_gateway
    ports:
      - 8080:8080
      - 9090:9090
    depends_on:
      - mysql
      - redis
      - zookeeper
      - kafka
    restart: always
